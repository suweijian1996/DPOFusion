model:
  base_learning_rate: 5.0e-6   # set to target_lr by starting main.py with '--scale_lr False'
  target: ldm.models.diffusion.ddpm_fusion.LatentDiffusion
  params:
    linear_start: 0.00085
    linear_end: 0.0012
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    loss_type: l1
    aug_key: "aug_src"
    first_stage_key: "image"
    cond_stage_key: "txt"
    image_size: 64
    channels: 3
    cond_stage_trainable: false   # Note: different from the one we trained be2ore
    conditioning_key: crossattn
    concat_mode: False
    scale_by_std: True
    monitor: 'val/loss_simple_ema'
    lossconfig:
      target: ldm.modules.losses.FusionLoss.FusionStageLoss
      params:
        weigth: 0.5


    scheduler_config: # 10000 warmup steps
      target: ldm.lr_scheduler.LambdaLinearScheduler
      params:
        warm_up_steps: [2000]
        cycle_lengths: [10000000000000]
        f_start: [1.e-2]
        f_max: [1.]
        f_min: [ 1.]

    unet_config:
      target: ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 64
        in_channels: 9
        out_channels: 3
        model_channels: 224
        use_spatial_transformer: true
        context_dim: 768
        transformer_depth: 1
        attention_resolutions:
        # note: this isn\t actually the resolution but
        # the downsampling factor, i.e. this corresnponds to
        # attention on spatial resolution 8,16,32, as the
        # spatial reolution of the latents is 64 for f4
        - 8
        - 4
        - 2
        num_res_blocks: 2
        channel_mult:
        - 1
        - 2
        - 3
        - 4
        num_head_channels: 32

    fusion_layer_config:
      target: ldm.models.fusion.autoencoder2fusion.AutoFusionEncoder
      params:
        embed_dim: 3
        ckpt_path: "models/fusion_layer_models/fusion_layer_color.ckpt"
        lossconfig:
          target: torch.nn.Identity


        first_stage_config:
          target: ldm.models.autoencoder.AutoencoderKL
          params:
            embed_dim: 3
            monitor: "val/rec_loss"
            ckpt_path: "models/first_stage_models/kl-f4/model.ckpt"
            ddconfig:
              double_z: true
              z_channels: 3
              resolution: 256
              in_channels: 3
              out_ch: 3
              ch: 128
              ch_mult:
              - 1
              - 2
              - 4
              num_res_blocks: 2
              attn_resolutions: []
              dropout: 0.0
            lossconfig:
              target: torch.nn.Identity
    cond_stage_config:
      target: ldm.modules.encoders.modules.FrozenCLIPEmbedder

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 8
    wrap: True
    train:
      target: ldm.data.LLVIP.LLVIPFusionTrain
      params:
        size: 256
        root: '.../train/'
        split: train
        keep_text: True
        random_crop: True
    validation:
      target: ldm.data.LLVIP.LLVIPFusionVal
      params:
        size: 256
        root: '.../test/'
        split: val
        keep_text: True
        random_crop: True

lightning:
  check_val_every_n_steps: 10
  max_epochs: 100
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 2000
        max_images: 8
        increase_log_steps: False

  trainer:
    benchmark: True
    max_epochs: 200