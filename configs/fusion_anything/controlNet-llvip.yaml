model:
  target: cldm.cldm.ControlLDM
  params:
    linear_start: 0.00085
    linear_end: 0.0120
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: "image"
    cond_stage_key: "txt"
    control_key: "mask"
    image_size: 64
    channels: 3
    cond_stage_trainable: false
    conditioning_key: crossattn
    monitor: val/loss_simple_ema
    scale_factor: 0.18215
    use_ema: False
    only_mid_control: False
    lossconfig:
      target: ldm.modules.losses.FusionLoss.FusionStageLoss
      params:
        weigth: 0.5

    control_stage_config:
      target: cldm.cldm.ControlNet
      params:
        image_size: 64 # unused
        in_channels: 9
        hint_channels: 3
        model_channels: 224
        attention_resolutions: [ 8, 4, 2 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 3, 4 ]
        # num_heads: 8
        num_head_channels: 32
        use_spatial_transformer: True
        transformer_depth: 1
        context_dim: 768
        use_checkpoint: True
        legacy: False

    unet_config:
      target: cldm.cldm.ControlledUnetModel
      params:
        image_size: 64 # unused
        in_channels: 9
        out_channels: 3
        model_channels: 224
        attention_resolutions: [ 8, 4, 2 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 3, 4 ]
        # num_heads: 8
        num_head_channels: 32
        use_spatial_transformer: True
        transformer_depth: 1
        context_dim: 768
        use_checkpoint: True
        legacy: False

    fusion_layer_config:
      target: ldm.models.fusion.autoencoder2fusion.AutoFusionEncoder
      params:
        embed_dim: 3
        ckpt_path: "models/fusion_layer_models/fusion_layer_color.ckpt"
        lossconfig:
          target: torch.nn.Identity
        first_stage_config:
          target: ldm.models.autoencoder.AutoencoderKL
          params:
            embed_dim: 3
            monitor: val/rec_loss
            ckpt_path: "models/first_stage_models/kl-f4/model.ckpt"
            ddconfig:
              double_z: true
              z_channels: 3
              resolution: 256
              in_channels: 3
              out_ch: 3
              ch: 128
              ch_mult:
              - 1
              - 2
              - 4
              num_res_blocks: 2
              attn_resolutions: []
              dropout: 0.0
            lossconfig:
              target: torch.nn.Identity

    cond_stage_config:
      target: ldm.modules.encoders.modules.FrozenCLIPEmbedder
